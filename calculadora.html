<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora de notas — Portal de Estudos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/variaveis.css">
  <link rel="stylesheet" href="assets/css/componentes.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#6D28D9">
  <link rel="apple-touch-icon" href="icone-192.png">
  <script src="assets/js/pwa.js" defer></script>
  <script src="assets/js/tema.js"></script>
</head>
<body data-pagina="calculadora">
  <header class="header">
    <div class="header__interno">
      <a class="header__marca" href="index.html"><span class="logo" aria-hidden="true">V</span> Portal da Vitória</a>
      <div class="header__busca">
        <label class="sr-only" for="busca-global">Buscar material em todas as matérias</label>
        <input id="busca-global" class="input" type="search" placeholder="Buscar material…" autocomplete="off" aria-label="Buscar material">
        <div id="busca-dropdown" class="busca-dropdown" role="listbox" hidden></div>
      </div>
      <nav class="header__nav" aria-label="Navegação principal">
        <a href="index.html" data-pagina="dashboard">Início</a>
        <a href="agenda.html" data-pagina="agenda">Provas</a>
        <a href="calculadora.html" data-pagina="calculadora">Calculadora</a>
        <a href="historico.html" data-pagina="historico">Histórico</a>
        <a href="party.html" data-pagina="party">Party</a>
        <button id="btn-tema" class="btn-tema" type="button" aria-label="Alternar modo noturno">🌙</button>
      </nav>
    </div>
  </header>

  <main class="container">
    <h1 class="pagina-titulo">Calculadora de notas</h1>
    <p class="pagina-sub">Lance os pontos de cada item e veja a situação ao vivo.</p>

    <div class="filtros">
      <div class="campo">
        <label class="campo__label" for="calc-semestre">Semestre</label>
        <select id="calc-semestre" class="select"></select>
      </div>
      <div class="campo">
        <label class="campo__label" for="calc-materia">Matéria</label>
        <select id="calc-materia" class="select"></select>
      </div>
    </div>

    <div class="calc-grid">
      <section class="card" aria-label="Lançamento de notas">
        <h2 class="card__titulo">Pontos por item</h2>
        <div id="campos-notas"></div>

        <details class="config-pesos">
          <summary>⚙️ Configurar avaliação</summary>

          <p class="campo__ajuda">Ligue/desligue cada item e ajuste a pontuação. Vale só para esta matéria.</p>
          <div class="barra-topo__acoes" style="margin-bottom:12px;">
            <button id="preset-sem" class="btn btn--secundario btn--pequeno" type="button">Modelo sem prática (100)</button>
            <button id="preset-com" class="btn btn--secundario btn--pequeno" type="button">Modelo com prática (110)</button>
          </div>

          <div id="editor-itens" class="editor-itens"></div>

          <div class="filtros" style="margin:16px 0 0;align-items:flex-end;">
            <div class="campo" style="max-width:200px;">
              <label class="campo__label" for="minima-pontos">Pontos para aprovar</label>
              <input id="minima-pontos" class="input" type="number" min="0" step="0.5">
            </div>
            <button id="btn-minima-60" class="btn btn--secundario btn--pequeno" type="button">Usar 60% do total</button>
          </div>
          <p id="total-info" class="pesos-soma"></p>

          <div class="filtros" style="margin-top:16px;align-items:flex-end;">
            <div class="campo" style="flex:1 1 180px;">
              <label class="campo__label" for="novo-item-nome">Novo item</label>
              <input id="novo-item-nome" class="input" type="text" placeholder="Ex.: Seminário">
            </div>
            <div class="campo" style="max-width:110px;">
              <label class="campo__label" for="novo-item-pts">Pontos</label>
              <input id="novo-item-pts" class="input" type="number" min="0" step="0.5" placeholder="5">
            </div>
            <button id="btn-add-item" class="btn btn--secundario btn--pequeno" type="button">Adicionar</button>
          </div>
        </details>

        <button id="btn-salvar" class="btn btn--primario" type="button" style="margin-top:12px;">Salvar lançamento</button>
      </section>

      <aside class="card" aria-label="Resultado">
        <h2 class="card__titulo">Resultado</h2>
        <div id="resultado" class="resultado"></div>
      </aside>
    </div>
  </main>

  <script src="data/conteudo.js"></script>
  <script src="assets/js/componentes-ui.js"></script>
  <script src="assets/js/calculadora.js"></script>
  <script src="assets/js/manifesto.js"></script>
  <script src="assets/js/notas.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
