<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora de notas — Portal de Estudos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/variaveis.css">
  <link rel="stylesheet" href="assets/css/componentes.css">
  <link rel="stylesheet" href="assets/css/layout.css">
</head>
<body data-pagina="calculadora">
  <header class="header">
    <div class="header__interno">
      <a class="header__marca" href="index.html"><span class="logo" aria-hidden="true">V</span> Portal da Vitória</a>
      <div class="header__busca">
        <label class="sr-only" for="busca-global">Buscar material em todas as matérias</label>
        <input id="busca-global" class="input" type="search" placeholder="Buscar material…" autocomplete="off" aria-label="Buscar material">
        <div id="busca-dropdown" class="busca-dropdown" role="listbox" hidden></div>
      </div>
      <nav class="header__nav" aria-label="Navegação principal">
        <a href="index.html" data-pagina="dashboard">Início</a>
        <a href="calculadora.html" data-pagina="calculadora">Calculadora</a>
        <a href="historico.html" data-pagina="historico">Histórico</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <h1 class="pagina-titulo">Calculadora de notas</h1>
    <p class="pagina-sub">Escolha a matéria, lance as notas e veja a média ao vivo.</p>

    <div class="filtros">
      <div class="campo">
        <label class="campo__label" for="calc-semestre">Semestre</label>
        <select id="calc-semestre" class="select"></select>
      </div>
      <div class="campo">
        <label class="campo__label" for="calc-materia">Matéria</label>
        <select id="calc-materia" class="select"></select>
      </div>
    </div>

    <div class="calc-grid">
      <section class="card" aria-label="Lançamento de notas">
        <h2 class="card__titulo">Notas por etapa</h2>
        <div class="notas-grid">
          <div class="campo">
            <label class="campo__label" for="nota-P1">P1 (0–10)</label>
            <input id="nota-P1" class="input" type="text" inputmode="decimal" placeholder="—" aria-describedby="erro-nota-P1">
            <span id="erro-nota-P1" class="campo__erro" role="alert"></span>
          </div>
          <div class="campo">
            <label class="campo__label" for="nota-P2">P2 (0–10)</label>
            <input id="nota-P2" class="input" type="text" inputmode="decimal" placeholder="—" aria-describedby="erro-nota-P2">
            <span id="erro-nota-P2" class="campo__erro" role="alert"></span>
          </div>
          <div class="campo">
            <label class="campo__label" for="nota-P3">P3 (0–10)</label>
            <input id="nota-P3" class="input" type="text" inputmode="decimal" placeholder="—" aria-describedby="erro-nota-P3">
            <span id="erro-nota-P3" class="campo__erro" role="alert"></span>
          </div>
        </div>

        <details class="config-pesos">
          <summary>Configurar pesos e média mínima</summary>
          <p class="campo__ajuda">Os pesos devem somar 100%. Ajuste conforme o critério do professor.</p>
          <div class="notas-grid">
            <div class="campo">
              <label class="campo__label" for="peso-P1">Peso P1 (%)</label>
              <input id="peso-P1" class="input" type="number" min="0" max="100" step="1">
            </div>
            <div class="campo">
              <label class="campo__label" for="peso-P2">Peso P2 (%)</label>
              <input id="peso-P2" class="input" type="number" min="0" max="100" step="1">
            </div>
            <div class="campo">
              <label class="campo__label" for="peso-P3">Peso P3 (%)</label>
              <input id="peso-P3" class="input" type="number" min="0" max="100" step="1">
            </div>
          </div>
          <div class="campo" style="max-width:200px;">
            <label class="campo__label" for="media-minima">Média mínima</label>
            <input id="media-minima" class="input" type="number" min="0" max="10" step="0.1" value="6">
          </div>
          <p id="pesos-soma" class="pesos-soma">Soma: 100%</p>
        </details>

        <button id="btn-salvar" class="btn btn--primario" type="button" style="margin-top:12px;">Salvar lançamento</button>
      </section>

      <aside class="card" aria-label="Resultado">
        <h2 class="card__titulo">Resultado</h2>
        <div id="resultado" class="resultado"></div>
      </aside>
    </div>
  </main>

  <script src="data/conteudo.js"></script>
  <script src="assets/js/componentes-ui.js"></script>
  <script src="assets/js/calculadora.js"></script>
  <script src="assets/js/manifesto.js"></script>
  <script src="assets/js/notas.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
