<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cronograma de provas — Portal de Estudos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/variaveis.css">
  <link rel="stylesheet" href="assets/css/componentes.css">
  <link rel="stylesheet" href="assets/css/layout.css">
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#6D28D9">
  <link rel="apple-touch-icon" href="icone-192.png">
  <script src="assets/js/pwa.js" defer></script>
  <script src="assets/js/tema.js"></script>
</head>
<body data-pagina="agenda">
  <header class="header">
    <div class="header__interno">
      <a class="header__marca" href="index.html"><span class="logo" aria-hidden="true">V</span> Portal da Vitória</a>
      <nav class="header__nav" aria-label="Navegação principal">
        <a href="index.html" data-pagina="dashboard">Início</a>
        <a href="agenda.html" data-pagina="agenda">Provas</a>
        <a href="calculadora.html" data-pagina="calculadora">Calculadora</a>
        <a href="historico.html" data-pagina="historico">Histórico</a>
        <a href="party.html" data-pagina="party">Party</a>
        <button id="btn-tema" class="btn-tema" type="button" aria-label="Alternar modo noturno">🌙</button>
      </nav>
    </div>
  </header>

  <main class="container">
    <h1 class="pagina-titulo">📅 Cronograma de provas</h1>
    <p class="pagina-sub">Marque as datas e acompanhe quanto falta pra cada uma.</p>

    <section class="card" aria-label="Marcar prova" style="margin-bottom:24px;">
      <div class="filtros" style="align-items:flex-end;margin-bottom:0;">
        <div class="campo" style="flex:1 1 180px;">
          <label class="campo__label" for="agenda-materia">Matéria</label>
          <select id="agenda-materia" class="select"></select>
        </div>
        <div class="campo" style="flex:0 1 140px;">
          <label class="campo__label" for="agenda-titulo">O quê</label>
          <input id="agenda-titulo" class="input" type="text" placeholder="Ex.: P2" autocomplete="off">
        </div>
        <div class="campo" style="flex:0 1 170px;">
          <label class="campo__label" for="agenda-data">Data</label>
          <input id="agenda-data" class="input" type="date">
        </div>
        <button id="btn-add-prova" class="btn btn--primario" type="button">Marcar</button>
      </div>
    </section>

    <div id="lista-agenda" aria-live="polite"></div>
  </main>

  <script src="data/conteudo.js"></script>
  <script src="assets/js/componentes-ui.js"></script>
  <script src="assets/js/manifesto.js"></script>
  <script src="assets/js/agenda.js"></script>
</body>
</html>
